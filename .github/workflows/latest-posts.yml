name: Update the README with a list of recent blog posts
on:
  schedule:
    # Runs every day at 3pm UTC (11pm SG)
    - cron: "0 15 * * *"

jobs:
  update_latest_posts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Get RSS Feed
        uses: kohrongying/readme-the-rss@master
        with:
          feed_url: https://newtbytes.cc/blog/rss.xml
          count: 3

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update latest blog posts in README.md
          file_pattern: README.md
